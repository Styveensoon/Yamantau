    <div class="breadcrumb">
        <a href="../index.html">Inicio</a> > <span>Contacto</span>
    </div>

    <main>
        <h1>Contacta con el búnker</h1>
        <p>Rellena el siguiente formulario y nos pondremos en contacto contigo de forma segura.</p>
        <form id="contactForm" class="modern-form">
            <div class="form-group">
                <label for="nombre">Nombre completo *</label>
                <input type="text" id="nombre" name="nombre" required>
                <div class="error-message" id="errorNombre"></div>
            </div>
            <div class="form-group">
                <label for="email">Correo electrónico *</label>
                <input type="email" id="email" name="email" required>
                <div class="error-message" id="errorEmail"></div>
            </div>
            <div class="form-group">
                <label for="telefono">Teléfono (opcional, solo números)</label>
                <input type="text" id="telefono" name="telefono">
                <div class="error-message" id="errorTelefono"></div>
            </div>
            <div class="form-group">
                <label for="mensaje">Mensaje * (mínimo 10 caracteres)</label>
                <textarea id="mensaje" name="mensaje" rows="5" required minlength="10"></textarea>
                <div class="error-message" id="errorMensaje"></div>
            </div>
            <button type="submit" class="btn">Enviar mensaje</button>
        </form>
    </main>

    </footer>
